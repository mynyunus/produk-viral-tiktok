<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Direktori niche produk viral TikTok Malaysia.">
  <title>Produk Viral TikTok Malaysia</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #101010;
      --muted: #666666;
      --border: #e9e9e9;
      --accent: #1e9d47;
      --max-width: 860px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(100% - 1.2rem, var(--max-width));
      margin-inline: auto;
      padding: 1.1rem 0 1.4rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 5.8vw, 2rem);
      line-height: 1.18;
    }

    .lead {
      margin: 0.55rem 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: 1fr;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .card:hover,
    .card:focus-visible {
      border-color: #d7d7d7;
      transform: translateY(-1px);
    }

    .card h2 {
      margin: 0 0 0.18rem;
      font-size: 1rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .hint {
      margin-top: 0.9rem;
      color: #555;
      font-size: 0.8rem;
    }

    .hint strong {
      color: var(--accent);
    }

    .copyright {
      margin-top: 0.7rem;
      color: #7a7a7a;
      font-size: 0.76rem;
    }

    @media (min-width: 700px) {
      .container {
        width: min(100% - 2rem, var(--max-width));
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <h1>Produk Viral TikTok Malaysia</h1>
    <p class="lead">Pilih niche yang anda nak buka.</p>

    <section class="grid" aria-label="Senarai niche">
      <a class="card" href="/supplement%20viral%20tiktok/">
        <h2>Supplement Viral TikTok</h2>
        <p>Niche kesihatan & suplemen dengan kategori masalah pengguna.</p>
      </a>

      <a class="card" href="/skincare%20%26%20beauty%20viral%20tiktok/">
        <h2>Skincare &amp; Beauty Viral TikTok</h2>
        <p>Niche skincare & beauty dengan kategori ikut masalah kulit.</p>
      </a>
    </section>

    <p class="copyright">&copy; <span id="year">2026</span> Produk Viral TikTok Malaysia</p>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
